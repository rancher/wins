name: Pull Request

on:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-2022]

    runs-on: ${{ matrix.platform }}

    steps:
    - name: Checkout code
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

    # This step is required otherwise the 'mage'
    # command cannot be used in subsequent steps
    - name: Install Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version: 'stable'
        cache: 'false'

    - name: Install Dependencies
      run: |
        go install github.com/magefile/mage@69e6f824732575e57977f68f8f3dd78313d666e5
        go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@8f3b0c7ed018e57905fbd873c697e0b1ede605a5

    - name: Build
      shell: pwsh
      run: |
        set PSModulePath=&&powershell -command "mage BuildAll"

    - name: Run E2E tests
      shell: pwsh
      run: |
        Install-Module -Name DockerMsftProvider -Force
        Import-Module -Name HostNetworkingService
        set PSModulePath=&&powershell -command "mage ci"
